<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Estação Meteorológica IoT{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  {% block extra_head %}{% endblock %}
</head>

<body>

  <!-- ── Navegação ─────────────────────────────────────────────────────────── -->
  <nav>
    <a class="nav-brand" href="/">
      <span class="dot"></span>
      Estação Meteorológica IoT
    </a>
    <div class="nav-links">
      <a href="/"         class="{{ 'active' if request.path == '/' }}">Painel</a>
      <a href="/leituras" class="{{ 'active' if request.path.startswith('/leituras') }}">Histórico</a>
    </div>
  </nav>

  <!-- ── Conteúdo principal ────────────────────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    Estação Meteorológica IoT — Engenharia de Computação Módulo 5
  </footer>

</body>
</html>
