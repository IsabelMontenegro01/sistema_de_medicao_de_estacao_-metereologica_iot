<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Estação Meteorológica IoT{% endblock %}</title>

  <!-- Google Fonts: Syne (display) + IBM Plex Mono (dados) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variáveis ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d11;
      --surface:   #13161e;
      --border:    #1f2430;
      --accent:    #00d4aa;       /* ciano-esmeralda */
      --accent2:   #ff6b35;       /* laranja para umidade */
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #ef4444;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
      --radius:    8px;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -.02em;
    }

    .nav-brand .dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.8); }
    }

    .nav-links { display: flex; gap: .25rem; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      padding: .4rem .85rem;
      border-radius: var(--radius);
      transition: color .2s, background .2s;
      letter-spacing: .02em;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); background: rgba(0,212,170,.08); }

    /* ── Layout principal ────────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Cards genéricos ─────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    /* ── Badges / chips ──────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: .72rem;
      padding: .2rem .55rem;
      border-radius: 4px;
      background: rgba(0,212,170,.12);
      color: var(--accent);
      border: 1px solid rgba(0,212,170,.25);
    }

    /* ── Botões ──────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem 1.1rem;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: filter .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }

    .btn-primary  { background: var(--accent); color: #000; }
    .btn-danger   { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn:hover    { filter: brightness(1.12); }

    /* ── Tabela ──────────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: .75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.025); }
    tbody td {
      padding: .75rem 1rem;
      font-size: .9rem;
      font-family: var(--mono);
    }

    /* ── Inputs & formulários ────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .field label { font-size: .8rem; color: var(--muted); font-weight: 600; letter-spacing: .05em; }

    input[type=text], input[type=number] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: .95rem;
      padding: .6rem .9rem;
      width: 100%;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    /* ── Flash messages ──────────────────────────────────────────────────── */
    .flash { padding: .75rem 1rem; border-radius: var(--radius); margin-bottom: 1rem; font-size: .9rem; }
    .flash.success { background: rgba(0,212,170,.1); border: 1px solid var(--accent); color: var(--accent); }
    .flash.error   { background: rgba(239,68,68,.1);  border: 1px solid var(--danger); color: var(--danger); }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── Utilitários ─────────────────────────────────────────────────────── */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: .5rem; }
    .gap-4 { gap: 1rem; }
    .mt-4  { margin-top: 1rem; }
    .mt-6  { margin-top: 1.5rem; }
    .mb-4  { margin-bottom: 1rem; }
    .mb-6  { margin-bottom: 1.5rem; }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-sm { font-size: .85rem; }
    .mono { font-family: var(--mono); }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Navegação ─────────────────────────────────────────────────────────── -->
  <nav>
    <a class="nav-brand" href="/">
      <span class="dot"></span>
      Estação Meteorológica IoT
    </a>
    <div class="nav-links">
      <a href="/"         class="{{ 'active' if request.path == '/' }}">Painel</a>
      <a href="/leituras" class="{{ 'active' if request.path.startswith('/leituras') }}">Histórico</a>
    </div>
  </nav>

  <!-- ── Conteúdo principal ────────────────────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    Estação Meteorológica IoT — Engenharia de Computação Módulo 5
  </footer>

</body>
</html>
